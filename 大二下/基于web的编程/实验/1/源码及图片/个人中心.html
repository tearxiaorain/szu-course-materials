<html>
<head>
    <title>个人中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .left-panel {
            width: 25%;
            background: #f5f5f5;
            padding: 20px;
            border-right: 2px solid #ddd;
        }

        .avatar {
            width: 100%;
            height: 250px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .info-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-row input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column; 
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }

        .nav-tabs {
            display: flex;
            gap: 25px;
        }

        .nav-tab {
            padding: 8px 15px;
            border: none;
            background: none;
            cursor: pointer;
            color: #666;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .nav-tab.active {
            background: #f0f4ff;
            color: #2c5aff;
            font-weight: bold;
        }

        .nav-tab:hover {
            background: #f5f5f5;
        }

        .image-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
        }

        .main-image {
            max-width: 85%;
            max-height: 75vh;
            object-fit: contain;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border: 2px solid #fff;
        }

        .logout-btn {
            padding: 8px 25px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <img src="张三.png" class="avatar" alt="张三头像">
            <form class="info-form">
                <div class="form-row">
                    <input type="text" value="张三" readonly>
                </div>
                <div class="form-row">
                    <input type="email" value="zhangsan@example.com" readonly>
                </div>
                <div class="form-row">
                    <input type="tel" value="138 1234 5678" readonly>
                </div>
                <div class="form-row">
                    <input type="text" value="计算机科学与技术" readonly>
                </div>
            </form>
        </div>

        <div class="right-panel">
            <div class="nav-header">
                <div class="nav-tabs">
                    <button class="nav-tab">基本信息</button>
                    <button class="nav-tab active">我的课程</button>
                    <button class="nav-tab">我的成绩</button>
                    <button class="nav-tab">安全设置</button>
                </div>
                <button class="logout-btn">注销</button>
            </div>
            <div class="image-container">
                <img src="课程表.png" class="main-image" alt="课程表">
            </div>
        </div>
    </div>
</body>
</html>
