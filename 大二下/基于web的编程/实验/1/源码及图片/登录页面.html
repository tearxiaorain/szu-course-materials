<html>
    <head>
        <title>登录页面</title>
        <style>
            form {
                margin: 20px auto;
                max-width: 350px;
                width: 90%;
                padding: 20px 30px;
                border: none;
                border-radius: 4px;
                box-shadow: 0px 0px 5px 5px rgba(0,0,0,0.1);
            }
            h1 {
                color: rgb(0, 0, 0);
                text-align: center;
            }
            input[type="text"]{
                display: block;
                width: 100%;
                margin: 10px auto;
                font-family: Arial;
                padding: 8px;
                border: 1px solid #000000;
                border-radius: 4px;
            }
            input[type="submit"]{
                display: block;
                width : 100%;
                margin: 10px auto;
                padding: 8px;
                background-color: rgb(9, 165, 35);
                color: rgb(255, 255, 255);
                border: none;
                border-radius: 4px;
            }
        </style>
    </head> 
    <body>
        <h1>登录页面</h1>
        <form>
                用户名:
                <input type = "text" placeholder="请输入用户名">
                密码：
                <input type = "text" placeholder="请输入密码">
                <input type = "checkbox"> 记住密码
                <input type= "submit" value="登录">
        </form>
    </body>
</html>
