<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阅读器</title>
    <style>
      *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body{
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        padding: 20px;
        text-align: center;
      }
      #toolbar{
        background-color: #333;
        color: white;
        text-align: center;
        width: 100vw;
        padding: 10px;
        top: 0;
        left: 0;
        position: fixed;
        z-index: 100;
      }
      .toolbar-button{
        background-color: #555;
        font-size: 16px;
        color: white;
        margin: 5px;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
      }
      #reader{
        margin: 60px auto;
        border: 2px solid #ccc;
        padding: 20px;
        box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        max-width: 800px;
        height: 2000px;
        position: relative;
      }
      #reader h2{
        line-height: 2;
      }
      .text-content{
        font-size: 18px;
        line-height: 1.6;
        text-align: justify;
        margin-bottom: 20px;
        color: #333;
        text-indent: 2em;
        text-decoration: none;
      }
      #note-container{
        width: 300px;
        height: 200px;
        background-color: #ffffff;
        border: 2px solid #ccc;
        box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
        padding: 10px;
        position: fixed;
        top: 65%;
        right: 3%;
      }
      #note-container p{
        margin: 10px 0;
        text-align: left;
        color: #222;
      }
    </style>
  </head>
  <body>
    <!-- 工具栏 -->
    <div id="toolbar">
      <button class="toolbar-button">放大</button>
      <button class="toolbar-button">缩小</button>
      <button class="toolbar-button">切换主题</button>
    </div>

    <!-- 阅读区域 -->
    <div id="reader">
      <h2>文章标题</h2>
      <p class="text-content">
        这是一段文本内容，旨在展示阅读器区域中的文本样式和布局效果。
      </p>
      <p class="text-content">阅读区域可以展示多个段落，提供更好的阅读体验。</p>
    </div>

    <!-- 笔记区域 -->
    <div id="note-container">
      <h3>笔记</h3>
      <p>这里是笔记内容，可以记录阅读过程中重要的事项。</p>
    </div>
  </body>
</html>
