<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Shopping Cart Animation</title>
    <style>
      /* 基础设置 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f0f0f0;
      }

      .button-container {
        perspective: 1000px;
      }

      /* 按钮样式 */
      .animated-button {
        position: relative;
        padding: 15px 30px;
        font-size: 18px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      /* 悬停效果 */
      .animated-button:hover {
        background-color: #2ecc71;
        transform: translateY(-10px);
        box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
      }

      /* 点击效果 */
      .animated-button:active {
        background-color: #e74c3c;
        transform: scale(0.98);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
      }

      /* 物品图标移动效果 */
      .animated-button:active .item {
        opacity: 1;
        transform: translate(-50px, -50px) rotate(360deg);
      }

      /* 伪元素设计 */
      .animated-button::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.1);
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.3s ease;
      }

      .animated-button:hover::before {
        opacity: 1;
        transform: scale(1);
      }

      .animated-button:active::before {
        opacity: 0.5;
        transform: scale(0.8);
      }

      /* 购物车图标样式 */
      .cart-icon {
        position: fixed;
        top: 20px;
        right: 20px;
        font-size: 24px;
        color: #333;
      }

      /* 物品图标样式 */
      .item {
        display: inline-block;
        margin-left: 10px;
        opacity: 0;
        transition: all 0.5s ease;
      }
    </style>
  </head>
  <body>
    <div class="cart-icon">购物车</div>
    <!-- 购物车图标 -->
    <div class="button-container">
      <button class="animated-button">
        Add to Cart
        <span class="item">物品</span>
        <!-- 物品图标 -->
      </button>
    </div>
  </body>
</html>
