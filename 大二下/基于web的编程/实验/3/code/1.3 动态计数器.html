<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态计数器</title>
    <style>
        /* 页面主体样式 */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
        }

        /* 容器样式 */
        .container {
            text-align: center;
            padding: 20px;
            border: 2px solid #ccc;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 300px;
        }

        /* 计数器样式 */
        .counter-value {
            font-size: 3em;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
        }

        /* 按钮样式 */
        .btn {
            padding: 10px 20px;
            margin: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            color: #fff;
            transition: background-color 0.3s ease;
        }

        #increment {
            background-color: #4CAF50;
        }

        #decrement {
            background-color: #f44336;
        }

        #increment:hover {
            background-color: #45a049;
        }

        #decrement:hover {
            background-color: #e53935;
        }

        /* 提示信息样式 */
        #message {
            color: red;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="counter" class="counter-value">0</div>
        <button id="increment" class="btn">加一</button>
        <button id="decrement" class="btn">减一</button>
        <p id="message"></p>
    </div>

    <script>
        // js3
        var num = 0;
        var count = document.getElementById("counter");
        var incre = document.getElementById("increment");
        var decre = document.getElementById("decrement");
        var mes = document.getElementById("message");

        count.innerText = num;

        function increListen() {
            if (num == 10) {
                mes.innerText = "计数器不能超过10";
            } else { 
                num++;
                count.innerText = num;
                mes.innerText = "";
            }
        }
        function decreListen() {
            if (num == 0) {
                mes.innerText = "计数器不能低于0";
            } else { 
                num--;
                count.innerText = num;
                mes.innerText = ""; 
            }
        }

        incre.onclick = increListen;
        decre.onclick = decreListen;


    </script>
</body>

</html>
