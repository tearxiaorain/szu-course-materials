<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星级评分系统</title>
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        .star-container {
            display: inline-flex;
            position: relative;
        }

        .star {
            font-size: 40px;
            color: gray;
            cursor: pointer;
            position: relative;
        }

        .star .half,
        .star .full {
            position: absolute;
            top: 0;
            left: 0;
            color: gold;
            overflow: hidden;
            display: none;
            /* 初始状态不显示高亮 */
        }

        .half {
            width: 50%;
            /* 半颗星宽度 */
        }

        .full {
            width: 100%;
            /* 整颗星宽度 */
        }

        #rating-display {
            font-size: 20px;
            margin-top: 20px;
        }

        #reset-rating {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #reset-rating:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="star-container">
            <span class="star" data-value="1">
                ★<span class="half">★</span><span class="full">★</span>
            </span>
            <span class="star" data-value="2">
                ★<span class="half">★</span><span class="full">★</span>
            </span>
            <span class="star" data-value="3">
                ★<span class="half">★</span><span class="full">★</span>
            </span>
            <span class="star" data-value="4">
                ★<span class="half">★</span><span class="full">★</span>
            </span>
            <span class="star" data-value="5">
                ★<span class="half">★</span><span class="full">★</span>
            </span>
        </div>

        <p id="rating-display">当前评分=0星</p>
        <button id="reset-rating">重置评分</button>
    </div>

    <script>
        // 这里开始写JS代码
        // js6
        // 初始化
        var stars = document.querySelectorAll(".star");
        var ratingDisplay = document.getElementById("rating-display");
        var resetButton = document.getElementById("reset-rating");
        var currentRating = 0;

        // 评分重置
        // 9
        function resetStars() {
            for (s of stars) {
                s.querySelector(".full").style.display = "none";
                s.querySelector(".half").style.display = "none";
            }
        }
        // 8
        function updateRatingDisplay() {
            ratingDisplay.textContent = "当前评分=" + currentRating + "星";
        }
        // 5
        function reset() {
            currentRating = 0;
            updateRatingDisplay();
            resetStars();
            console.log("评分已重置");
        }
        resetButton.onclick = reset;

        // 6、7
        function calculateHoverRating(event, star) {
            var bound = star.getBoundingClientRect();
            var bWidth = bound.width;
            var mousePos = event.clientX - bound.left;
            var starValue = parseInt(star.getAttribute('data-value'));

            if (mousePos < bWidth / 2) {
                return starValue - 0.5;
            } else {
                return starValue;
            }
        }

        function highlightStars(rating) {
            stars.forEach(star => {
                var starValue = parseInt(star.getAttribute('data-value'));
                var shalf = star.querySelector('.half');
                var sfull = star.querySelector('.full');

                shalf.style.display = "none";
                sfull.style.display = "none";

                if (starValue <= rating) {
                    sfull.style.display = "block";
                } else if (starValue <= rating + 0.5) {
                    shalf.style.display = "block";
                }
            });
        }

        // // 悬停高亮
        // function mousemove_Listen() {
        //     var rating = calculateHoverRating();
        //     highlightStars(rating);
        // }
        // // 移开恢复评分
        // function mouseout_Listen() {
        //     highlightStars(currentRating);
        // }
        // // 点击评分
        // function click_Listen() {
        //     var rating = calculateHoverRating();
        //     currentRating = rating;
        //     updateRatingDisplay(currentRating);
        //     console.log("评分=" + currentRating);
        // }

        stars.forEach(star => {
            star.addEventListener("mousemove", (event) => {
                var rating = calculateHoverRating(event, star);
                highlightStars(rating);
            });

            star.addEventListener("mouseout", (event) => {
                highlightStars(currentRating);
            });

            star.addEventListener("click", (event) => {
                var rating = calculateHoverRating(event, star);
                currentRating = rating;
                updateRatingDisplay();
                console.log("评分=" + currentRating);
            });
        });

    </script>

</body>

</html>
